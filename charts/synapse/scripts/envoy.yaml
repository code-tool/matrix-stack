admin:
  address:
    socket_address:
      address: 0.0.0.0
      port_value: 9901

overload_manager:
  refresh_interval: 0.25s
  resource_monitors:
    - name: "envoy.resource_monitors.fixed_heap"
      typed_config:
        "@type": type.googleapis.com/envoy.extensions.resource_monitors.fixed_heap.v3.FixedHeapConfig
        max_heap_size_bytes: 2147483648
    - name: "envoy.resource_monitors.global_downstream_max_connections"
      typed_config:
        "@type": type.googleapis.com/envoy.extensions.resource_monitors.downstream_connections.v3.DownstreamConnectionsConfig
        max_active_downstream_connections: 50000
  actions:
    - name: "envoy.overload_actions.shrink_heap"
      triggers:
        - name: "envoy.resource_monitors.fixed_heap"
          threshold:
            value: 0.95
    - name: "envoy.overload_actions.stop_accepting_requests"
      triggers:
        - name: "envoy.resource_monitors.fixed_heap"
          threshold:
            value: 0.98

layered_runtime:
  layers:
    - name: static_layer_0
      static_layer:
        envoy:
          resource_limits:
            listener:
              httpd:
                connection_limit: 49000

static_resources:
  listeners:
    - name: listener_0
      address:
        socket_address:
          protocol: TCP
          address: 0.0.0.0
          port_value: 10000
      filter_chains:
        - filters:
            - name: envoy.filters.network.http_connection_manager
              typed_config:
                "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                stat_prefix: ingress_http
                route_config:
                  name: local_route
                  virtual_hosts:
                    - name: local_service
                      domains: ["*"]
                      routes:
                        - match:
                            safe_regex:
                              regex: '^/_matrix/client/(api/v1|r0|v3|unstable)/(sync|events|initialSync|rooms/[^/]+/initialSync)(?:\?.*)?$'
                          route:
                            timeout: 300s
                            auto_host_rewrite: true
                            cluster: httpd-token-hash
                            hash_policy:
                              - header:
                                  header_name: X-Hash-Key
                          typed_per_filter_config:
                            envoy.filters.http.lua:
                              "@type": type.googleapis.com/envoy.extensions.filters.http.lua.v3.LuaPerRoute
                              name: token_hash
                        - match:
                            safe_regex:
                              regex: '^/_matrix/client/unstable/org\.matrix\.simplified_msc3575/sync(?:\?.*)?$'
                          route:
                            timeout: 300s
                            auto_host_rewrite: true
                            cluster: httpd-token-hash
                            hash_policy:
                              - header:
                                  header_name: X-Hash-Key
                          typed_per_filter_config:
                            envoy.filters.http.lua:
                              "@type": type.googleapis.com/envoy.extensions.filters.http.lua.v3.LuaPerRoute
                              name: token_hash
                        - match:
                            safe_regex:
                              regex: '^/_matrix/client/.*(?:%21|!)[A-Za-z0-9._=/-]+(?::|%3[Aa])[A-Za-z0-9.-]+.*$'
                          route:
                            timeout: 300s
                            auto_host_rewrite: true
                            cluster: httpd-room-hash
                            hash_policy:
                              - header:
                                  header_name: X-Hash-Key
                          typed_per_filter_config:
                            envoy.filters.http.lua:
                              "@type": type.googleapis.com/envoy.extensions.filters.http.lua.v3.LuaPerRoute
                              name: room_hash
                        - match:
                            prefix: "/"
                          route:
                            timeout: 300s
                            auto_host_rewrite: true
                            cluster: httpd
                http_filters:
                  - name: envoy.filters.http.lua
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.lua.v3.Lua
                      default_source_code:
                        inline_string: |
                          function envoy_on_request(request_handle)
                            return
                          end
                      source_codes:
                        token_hash:
                          inline_string: |
                            package.path = package.path .. ";/usr/lib/?.lua"
                            local synapse = require("synapse")

                            function envoy_on_request(request_handle)
                              local headers = request_handle:headers()
                              local hash_key = synapse.get_access_token_from_request(headers)

                              if hash_key ~= nil then
                                headers:add("X-Hash-Key", hash_key)
                                return
                              end

                              headers:add("X-Hash-Key", headers:get("x-request-id"))
                            end
                        room_hash:
                          inline_string: |
                            package.path = package.path .. ";/usr/lib/?.lua"
                            local synapse = require("synapse")

                            function envoy_on_request(request_handle)
                              local headers = request_handle:headers()
                              local hash_key = synapse.get_room_id_from_request(headers)

                              if hash_key ~= nil then
                                headers:add("X-Hash-Key", hash_key)
                                return
                              end

                              headers:add("X-Hash-Key", headers:get("x-request-id"))
                            end
                  - name: envoy.filters.http.router
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router
  clusters:
    - name: httpd
      connect_timeout: 0.02s
      type: STRICT_DNS
      dns_lookup_family: V4_ONLY
      lb_policy: ROUND_ROBIN
      circuit_breakers:
        thresholds:
          - priority: DEFAULT
            max_connections: 30000
            max_requests: 8192
            max_retries: 3
          - priority: HIGH
            max_connections: 30000
            max_requests: 8192
            max_retries: 3
      load_assignment:
        cluster_name: httpd
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address:
                      address: synapse-client-reader-headless
                      port_value: 8008
    - name: httpd-room-hash
      connect_timeout: 0.02s
      type: STRICT_DNS
      dns_lookup_family: V4_ONLY
      lb_policy: RING_HASH
      circuit_breakers:
        thresholds:
          - priority: DEFAULT
            max_connections: 30000
            max_requests: 8192
            max_retries: 3
          - priority: HIGH
            max_connections: 30000
            max_requests: 8192
            max_retries: 3
      load_assignment:
        cluster_name: httpd-room-hash
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address:
                      address: synapse-client-reader-headless
                      port_value: 8008
    - name: httpd-token-hash
      connect_timeout: 0.02s
      type: STRICT_DNS
      dns_lookup_family: V4_ONLY
      lb_policy: RING_HASH
      circuit_breakers:
        thresholds:
          - priority: DEFAULT
            max_connections: 30000
            max_requests: 8192
            max_retries: 3
          - priority: HIGH
            max_connections: 30000
            max_requests: 8192
            max_retries: 3
      load_assignment:
        cluster_name: httpd-token-hash
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address:
                      address: synapse-client-reader-headless
                      port_value: 8008
