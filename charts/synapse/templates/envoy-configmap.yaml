                max_requests: 8192
                max_retries: 3
              - priority: HIGH
                max_connections: 30000
                max_requests: 8192
                max_retries: 3
          load_assignment:
            cluster_name: httpd-user-hash
            endpoints:
              - lb_endpoints:
                  - endpoint:
                      address:
                        socket_address:
                          address: synapse-sync-headless
                          port_value: 8008
        - name: httpd-master
          connect_timeout: 0.02s
          type: STRICT_DNS
          dns_lookup_family: V4_ONLY
          ignore_health_on_host_removal: true
          lb_policy: LEAST_REQUEST
          least_request_lb_config:
            choice_count: 2
          circuit_breakers:
            thresholds:
              - priority: DEFAULT
                max_connections: 30000
