apiVersion: v1
kind: ConfigMap
metadata:
  name: synapse-client-reader-envoy
  labels:
    {{- include "synapse-client-reader.selectorLabels" . | nindent 4 }}
data:
  envoy.yaml: |
    admin:
      address:
        socket_address:
          address: 0.0.0.0
          port_value: 9901

    overload_manager:
      refresh_interval: 0.25s
      resource_monitors:
        - name: "envoy.resource_monitors.fixed_heap"
          typed_config:
            "@type": type.googleapis.com/envoy.extensions.resource_monitors.fixed_heap.v3.FixedHeapConfig
            max_heap_size_bytes: 2147483648
        - name: "envoy.resource_monitors.global_downstream_max_connections"
          typed_config:
            "@type": type.googleapis.com/envoy.extensions.resource_monitors.downstream_connections.v3.DownstreamConnectionsConfig
            max_active_downstream_connections: 50000
      actions:
        - name: "envoy.overload_actions.shrink_heap"
          triggers:
            - name: "envoy.resource_monitors.fixed_heap"
              threshold:
                value: 0.95
        - name: "envoy.overload_actions.stop_accepting_requests"
          triggers:
            - name: "envoy.resource_monitors.fixed_heap"
              threshold:
                value: 0.98

    layered_runtime:
      layers:
        - name: static_layer_0
          static_layer:
            envoy:
              resource_limits:
                listener:
                  httpd:
                    connection_limit: 49000

    static_resources:
      listeners:
        - name: listener_0
          address:
            socket_address:
              protocol: TCP
              address: 0.0.0.0
              port_value: 10000
          filter_chains:
            - filters:
                - name: envoy.filters.network.http_connection_manager
                  typed_config:
                    "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                    stat_prefix: ingress_http
                    xff_num_trusted_hops: 2
                    route_config:
                      name: local_route
                      virtual_hosts:
                        - name: local_service
                          domains: ["*"]
                          routes:
                            # CORS preflight — intercept all OPTIONS requests, no upstream proxy
                            - match:
                                prefix: "/"
                                headers:
                                  - name: ":method"
                                    string_match:
                                      exact: "OPTIONS"
                              direct_response:
                                status: 204
                              response_headers_to_add:
                                - header:
                                    key: "access-control-allow-origin"
                                    value: "*"
                                - header:
                                    key: "access-control-allow-methods"
                                    value: "GET, HEAD, POST, PUT, DELETE, OPTIONS"
                                - header:
                                    key: "access-control-allow-headers"
                                    value: "X-Requested-With, Content-Type, Authorization, Date"
                                - header:
                                    key: "access-control-expose-headers"
                                    value: "Synapse-Trace-Id, Server"
                                - header:
                                    key: "content-length"
                                    value: "0"
                            {{- range $route := .Values.ingress.masterOverridesRoutes }}
                            - match:
                                safe_regex:
                                  regex: {{ printf "^%s" $route | squote }}
                              route:
                                timeout: 300s
                                auto_host_rewrite: true
                                cluster: httpd-master
                            {{- end }}
                            {{- range $route := .Values.ingress.roomFederationRoutes }}
                            - match:
                                safe_regex:
                                  regex: {{ printf "^%s" $route | squote }}
                              route:
                                timeout: 300s
                                auto_host_rewrite: true
                                cluster: httpd-federation-ip-hash
                                hash_policy:
                                  - connection_properties:
                                      source_ip: true
                            {{- end }}
                            {{- range $route := .Values.ingress.typing }}
                            - match:
                                safe_regex:
                                  regex: {{ printf "^%s" $route | squote }}
                              route:
                                timeout: 300s
                                auto_host_rewrite: true
                                cluster: httpd-typing
                            {{- end }}
                            {{- range $route := .Values.ingress.toDevice }}
                            - match:
                                safe_regex:
                                  regex: {{ printf "^%s" $route | squote }}
                              route:
                                timeout: 300s
                                auto_host_rewrite: true
                                cluster: httpd-to-device
                            {{- end }}
                            {{- range $route := .Values.ingress.accountData }}
                            - match:
                                safe_regex:
                                  regex: {{ printf "^%s" $route | squote }}
                              route:
                                timeout: 300s
                                auto_host_rewrite: true
                                cluster: httpd-account-data
                            {{- end }}
                            {{- range $route := .Values.ingress.receipts }}
                            - match:
                                safe_regex:
                                  regex: {{ printf "^%s" $route | squote }}
                              route:
                                timeout: 300s
                                auto_host_rewrite: true
                                cluster: httpd-receipts
                            {{- end }}
                            {{- range $route := .Values.ingress.presence }}
                            - match:
                                safe_regex:
                                  regex: {{ printf "^%s" $route | squote }}
                              route:
                                timeout: 300s
                                auto_host_rewrite: true
                                cluster: httpd-presence
                            {{- end }}
                            {{- range $route := .Values.ingress.pushRulesRoutes }}
                            - match:
                                safe_regex:
                                  regex: {{ printf "^%s" $route | squote }}
                              route:
                                timeout: 300s
                                auto_host_rewrite: true
                                cluster: httpd-push-rules
                            {{- end }}
                            {{- range $route := .Values.ingress.deviceListsRoutes }}
                            - match:
                                safe_regex:
                                  regex: {{ printf "^%s" $route | squote }}
                              route:
                                timeout: 300s
                                auto_host_rewrite: true
                                cluster: httpd-device-lists
                            {{- end }}
                            {{- if .Values.experimentalFeatures.msc4306.enabled }}
                            {{- range $route := .Values.ingress.threadSubscriptionsRoutes }}
                            - match:
                                safe_regex:
                                  regex: {{ printf "^%s" $route | squote }}
                              route:
                                timeout: 300s
                                auto_host_rewrite: true
                                cluster: httpd-thread-subscriptions
                            {{- end }}
                            {{- end }}
                            {{- range $route := .Values.ingress.syncRoutes }}
                            - match:
                                safe_regex:
                                  regex: {{ printf "^%s" $route | squote }}
                              route:
                                timeout: 300s
                                auto_host_rewrite: true
                                cluster: httpd-user-hash
                                hash_policy:
                                  - header:
                                      header_name: X-Hash-Key
                              typed_per_filter_config:
                                envoy.filters.http.lua:
                                  "@type": type.googleapis.com/envoy.extensions.filters.http.lua.v3.LuaPerRoute
                                  name: whoami_hash
                            {{- end }}
                            {{- range $route := .Values.ingress.roomRoutes }}
                            - match:
                                safe_regex:
                                  regex: {{ printf "^%s" $route | squote }}
                              route:
                                timeout: 300s
                                auto_host_rewrite: true
                                cluster: httpd-room-hash
                                hash_policy:
                                  - header:
                                      header_name: X-Hash-Key
                              typed_per_filter_config:
                                envoy.filters.http.lua:
                                  "@type": type.googleapis.com/envoy.extensions.filters.http.lua.v3.LuaPerRoute
                                  name: room_hash
                            {{- end }}
                            {{- range $route := .Values.ingress.clientReaderRoutes }}
                            - match:
                                safe_regex:
                                  regex: {{ printf "^%s" $route | squote }}
                              route:
                                timeout: 300s
                                auto_host_rewrite: true
                                cluster: httpd-client-reader
                            {{- end }}
                            {{- if not .Values.matrixAuthentication.enabled }}
                            {{- range $route := .Values.ingress.clientReaderRegister }}
                            - match:
                                safe_regex:
                                  regex: {{ printf "^%s" $route | squote }}
                              route:
                                timeout: 300s
                                auto_host_rewrite: true
                                cluster: httpd-client-reader
                            {{- end }}
                            {{- end }}
                            {{- if .Values.matrixAuthentication.enabled }}
                            {{- range $route := .Values.ingress.matrixAuthentication }}
                            - match:
                                safe_regex:
                                  regex: {{ printf "^%s" $route | squote }}
                              route:
                                timeout: 300s
                                auto_host_rewrite: true
                                cluster: httpd-matrix-auth
                            {{- end }}
                            {{- end }}
                            {{- range $route := .Values.ingress.userDirectoryRoutes }}
                            - match:
                                safe_regex:
                                  regex: {{ printf "^%s" $route | squote }}
                              route:
                                timeout: 300s
                                auto_host_rewrite: true
                                cluster: httpd-user-dir
                            {{- end }}
                            {{- range $route := .Values.ingress.mediaRepository }}
                            - match:
                                safe_regex:
                                  regex: {{ printf "^%s" $route | squote }}
                              route:
                                timeout: 300s
                                auto_host_rewrite: true
                                cluster: httpd-media-repository
                            {{- end }}
                            {{- range $route := .Values.ingress.federationReaderRoutes }}
                            - match:
                                safe_regex:
                                  regex: {{ printf "^%s" $route | squote }}
                              route:
                                timeout: 300s
                                auto_host_rewrite: true
                                cluster: httpd-federation-ip-hash
                                hash_policy:
                                  - connection_properties:
                                      source_ip: true
                            {{- end }}
                            {{- range $route := .Values.ingress.masterRoutes }}
                            - match:
                                safe_regex:
                                  regex: {{ printf "^%s" $route | squote }}
                              route:
                                timeout: 300s
                                auto_host_rewrite: true
                                cluster: httpd-master
                            {{- end }}
                            - match:
                                prefix: "/"
                              direct_response:
                                status: 404
                                body:
                                  inline_string: "not found\n"
                              typed_per_filter_config:
                                envoy.filters.http.lua:
                                  "@type": type.googleapis.com/envoy.extensions.filters.http.lua.v3.LuaPerRoute
                                  name: unmatched_route_log
                    http_filters:
                      - name: envoy.filters.http.lua
                        typed_config:
                          "@type": type.googleapis.com/envoy.extensions.filters.http.lua.v3.Lua
                          default_source_code:
                            inline_string: |
                              function envoy_on_request(request_handle)
                                return
                              end
                          source_codes:
                            whoami_hash:
                              inline_string: |
                                package.path = package.path .. ";/usr/lib/?.lua"
                                local synapse = require("synapse")

                                function envoy_on_request(request_handle)
                                  local hash_key = synapse.get_user_identifier_from_request(request_handle, {
                                    whoami_cluster = "httpd-client-reader",
                                    whoami_path = "/_matrix/client/v3/account/whoami",
                                    cache_ttl_seconds = 300,
                                    timeout_ms = 5000,
                                    logging_enabled = false,
                                    logging_token_length = 8
                                  })

                                  local headers = request_handle:headers()
                                  if hash_key ~= nil then
                                    headers:add("X-Hash-Key", hash_key)
                                    return
                                  end

                                  synapse.set_request_id_hash_key_with_fallback_log(request_handle, headers, "user")
                                end
                            room_hash:
                              inline_string: |
                                package.path = package.path .. ";/usr/lib/?.lua"
                                local synapse = require("synapse")

                                function envoy_on_request(request_handle)
                                  local headers = request_handle:headers()
                                  local hash_key = synapse.get_room_id_from_request(headers)

                                  if hash_key ~= nil then
                                    headers:add("X-Hash-Key", hash_key)
                                    return
                                  end

                                  synapse.set_request_id_hash_key_with_fallback_log(request_handle, headers, "room")
                                end
                            unmatched_route_log:
                              inline_string: |
                                function envoy_on_request(request_handle)
                                  local headers = request_handle:headers()
                                  request_handle:logWarn(
                                    "synapse_envoy_unmatched_route: method="
                                    .. tostring(headers:get(":method"))
                                    .. " path="
                                    .. tostring(headers:get(":path"))
                                    .. " authority="
                                    .. tostring(headers:get(":authority"))
                                  )
                                end
                      - name: envoy.filters.http.router
                        typed_config:
                          "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router
      clusters:
        - name: httpd-client-reader
          connect_timeout: 0.02s
          type: STRICT_DNS
          dns_lookup_family: V4_ONLY
          ignore_health_on_host_removal: true
          lb_policy: LEAST_REQUEST
          least_request_lb_config:
            choice_count: 2
          outlier_detection:
            consecutive_5xx: 5
            consecutive_gateway_failure: 5
            interval: 10s
            base_ejection_time: 30s
            max_ejection_percent: 50
          circuit_breakers:
            thresholds:
              - priority: DEFAULT
                max_connections: 30000
                max_requests: 8192
                max_retries: 3
              - priority: HIGH
                max_connections: 30000
                max_requests: 8192
                max_retries: 3
          load_assignment:
            cluster_name: httpd-client-reader
            endpoints:
              - lb_endpoints:
                  - endpoint:
                      address:
                        socket_address:
                          address: synapse-client-reader-headless
                          port_value: 8008
        - name: httpd-federation-ip-hash
          connect_timeout: 0.02s
          type: STRICT_DNS
          dns_lookup_family: V4_ONLY
          ignore_health_on_host_removal: true
          lb_policy: RING_HASH
          circuit_breakers:
            thresholds:
              - priority: DEFAULT
                max_connections: 30000
                max_requests: 8192
                max_retries: 3
              - priority: HIGH
                max_connections: 30000
                max_requests: 8192
                max_retries: 3
          load_assignment:
            cluster_name: httpd-federation-ip-hash
            endpoints:
              - lb_endpoints:
                  - endpoint:
                      address:
                        socket_address:
                          address: synapse-federation-reader-headless
                          port_value: 8008
        - name: httpd-room-hash
          connect_timeout: 0.02s
          type: STRICT_DNS
          dns_lookup_family: V4_ONLY
          ignore_health_on_host_removal: true
          lb_policy: RING_HASH
          circuit_breakers:
            thresholds:
              - priority: DEFAULT
                max_connections: 30000
                max_requests: 8192
                max_retries: 3
              - priority: HIGH
                max_connections: 30000
                max_requests: 8192
                max_retries: 3
          load_assignment:
            cluster_name: httpd-room-hash
            endpoints:
              - lb_endpoints:
                  - endpoint:
                      address:
                        socket_address:
                          address: synapse-room-headless
                          port_value: 8008
        - name: httpd-user-hash
          connect_timeout: 0.02s
          type: STRICT_DNS
          dns_lookup_family: V4_ONLY
          ignore_health_on_host_removal: true
          lb_policy: RING_HASH
