              - priority: HIGH
                max_connections: 30000
                max_requests: 8192
                max_retries: 3
          load_assignment:
            cluster_name: httpd-master
            endpoints:
              - lb_endpoints:
                  - endpoint:
                      address:
                        socket_address:
                          address: synapse-master
                          port_value: 8008
        - name: httpd-typing
