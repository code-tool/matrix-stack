---
# Source: synapse/templates/envoy-configmap.yaml
apiVersion: v1
kind: ConfigMap
metadata:
  name: synapse-client-reader-envoy
  labels:
    app: synapse
    component: synapse-client-reader
data:
  envoy.yaml: |
    admin:
      address:
        socket_address:
          address: 0.0.0.0
          port_value: 9901

    overload_manager:
      refresh_interval: 0.25s
      resource_monitors:
        - name: "envoy.resource_monitors.fixed_heap"
          typed_config:
            "@type": type.googleapis.com/envoy.extensions.resource_monitors.fixed_heap.v3.FixedHeapConfig
            max_heap_size_bytes: 2147483648
        - name: "envoy.resource_monitors.global_downstream_max_connections"
          typed_config:
            "@type": type.googleapis.com/envoy.extensions.resource_monitors.downstream_connections.v3.DownstreamConnectionsConfig
            max_active_downstream_connections: 50000
      actions:
        - name: "envoy.overload_actions.shrink_heap"
          triggers:
            - name: "envoy.resource_monitors.fixed_heap"
              threshold:
                value: 0.95
        - name: "envoy.overload_actions.stop_accepting_requests"
          triggers:
            - name: "envoy.resource_monitors.fixed_heap"
              threshold:
                value: 0.98

    layered_runtime:
      layers:
        - name: static_layer_0
          static_layer:
            re2.max_program_size.error_level: 500
            envoy:
              resource_limits:
                listener:
                  httpd:
                    connection_limit: 49000

    static_resources:
      listeners:
        - name: listener_0
          address:
            socket_address:
              protocol: TCP
              address: 0.0.0.0
              port_value: 10000
          filter_chains:
            - filters:
                - name: envoy.filters.network.http_connection_manager
                  typed_config:
                    "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                    stat_prefix: ingress_http
                    xff_num_trusted_hops: 2
                    merge_slashes: true
                    normalize_path: true
                    route_config:
                      name: local_route
                      virtual_hosts:
                        - name: local_service
                          domains: ["*"]
                          routes:
                            # CORS preflight — intercept all OPTIONS requests, no upstream proxy
                            - match:
                                prefix: "/"
                                headers:
                                  - name: ":method"
                                    string_match:
                                      exact: "OPTIONS"
                              direct_response:
                                status: 204
                              response_headers_to_add:
                                - header:
                                    key: "access-control-allow-origin"
                                    value: "*"
                                - header:
                                    key: "access-control-allow-methods"
                                    value: "GET, HEAD, POST, PUT, DELETE, OPTIONS"
                                - header:
                                    key: "access-control-allow-headers"
                                    value: "X-Requested-With, Content-Type, Authorization, Date"
                                - header:
                                    key: "access-control-expose-headers"
                                    value: "Synapse-Trace-Id, Server"
                                - header:
                                    key: "content-length"
                                    value: "0"
                            - match:
                                safe_regex:
                                  regex: '^/_matrix/client/(api/v1|r0|v3|unstable)/(account/3pid/|directory/list/room/|rooms/[^/]+/(forget|upgrade|report)).*'
                              route:
                                timeout: 300s
                                auto_host_rewrite: true
                                cluster: httpd-master
                            - match:
                                safe_regex:
                                  regex: '^/_matrix/client/(unstable|v1)/org\.matrix\.msc4108/rendezvous$'
                              route:
                                timeout: 300s
                                auto_host_rewrite: true
                                cluster: httpd-master
                            - match:
                                safe_regex:
                                  regex: '^/_synapse/client/rendezvous$'
                              route:
                                timeout: 300s
                                auto_host_rewrite: true
                                cluster: httpd-master
                            - match:
                                safe_regex:
                                  regex: '^/_matrix/client/(r0|v3|unstable)/rooms/[^/]+/receipt/[^/]+/[^/]+$'
                              route:
                                timeout: 300s
                                auto_host_rewrite: true
                                cluster: httpd-receipts
                            - match:
                                safe_regex:
                                  regex: '^/_matrix/client/(r0|v3|unstable)/rooms/[^/]+/read_markers$'
                              route:
                                timeout: 300s
                                auto_host_rewrite: true
                                cluster: httpd-receipts
                            - match:
                                safe_regex:
                                  regex: '^/_matrix/client/(api/v1|r0|v3|unstable)/rooms/[^/]+/typing/[^/]+$'
                              route:
                                timeout: 300s
                                auto_host_rewrite: true
                                cluster: httpd-typing
                            - match:
