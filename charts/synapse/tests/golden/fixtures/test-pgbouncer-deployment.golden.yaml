---
# Source: synapse/templates/pgbouncer-deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: synapse-pgbouncer
  labels:
    app: synapse-pgbouncer
spec:
  replicas: 2
  selector:
    matchLabels:
      app: synapse-pgbouncer
  strategy: 
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 1
    type: RollingUpdate
  template:
    metadata:
      annotations:
        checksum/config: 4b70facc53fa97e364187132ccb3ba8b3778453d83a3fd675e0e7a4f4232e3cf
        checksum/secret: 251d899dfbca051b8c55e05538e5c9862a8db817c3177c5746beb367f25a24e5
      labels:
        app: synapse-pgbouncer
    spec:
      containers:
      - name: pgbouncer
        image: ghcr.io/icoretech/pgbouncer-docker:1.24.1
        imagePullPolicy: IfNotPresent
        resources:
          
          {}
        ports:
          - containerPort: 5432
            name: pgbouncer
            protocol: TCP
        readinessProbe:
          tcpSocket:
            port: 5432
          initialDelaySeconds: 10
          periodSeconds: 5
        livenessProbe:
          tcpSocket:
            port: 5432
          initialDelaySeconds: 60
          periodSeconds: 10
        volumeMounts:
        - name: config
          mountPath: /etc/pgbouncer/
        - name: userlist
          mountPath: /etc/userlist/
      terminationGracePeriodSeconds: 10
      volumes:
      - name: config
        configMap:
          name: synapse-pgbouncer
      - name: userlist
        secret:
          secretName: synapse-pgbouncer