---
# Source: synapse/templates/well-known-configmap.yaml
apiVersion: v1
kind: ConfigMap
metadata:
  name: well-known-config
  labels:
    app: well-known
data:
  default.conf: |
    server {
        listen       80;
        server_name  localhost;
        default_type application/json;
        add_header Access-Control-Allow-Origin *;
        location / {
            root   /usr/share/nginx/html;
        }
    }

  client: |
    {
      "m.homeserver": {
        "base_url": "https://NOT-CONFIGURED"
      },
      "org.matrix.msc2965.authentication": {
        "issuer": "https://NOT-CONFIGURED/",
        "account": "https://NOT-CONFIGURED/account"
      },
      "jitsi": {
        "preferredDomain": "meet.jit.si"
      },
      "im.vector.riot.jitsi": {
        "preferredDomain": "meet.jit.si"
      },
      "io.element.e2ee": {
        "default":true
      }
    }

  server: |
    {
      "m.server": "NOT-CONFIGURED:443"
    }
  openid-configuration: |
    {
      "issuer": "https://NOT-CONFIGURED",
      "authorization_endpoint": "https://NOT-CONFIGURED/authorize",
      "token_endpoint": "https://NOT-CONFIGURED/oauth2/token",
      "jwks_uri": "https://NOT-CONFIGURED/oauth2/keys.json",
      "registration_endpoint": "https://NOT-CONFIGURED/oauth2/registration"
    }