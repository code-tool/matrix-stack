---
# Source: synapse/templates/envoy-servicemonitor.yaml
kind: ServiceMonitor
apiVersion: monitoring.coreos.com/v1
metadata:
  name: envoy-service
  labels:
    app: synapse
    component: synapse-client-reader-envoy
spec:
  endpoints:
  - interval: 60s
    path: /stats/prometheus
    port: http-admin
  jobLabel: envoy-service
  selector:
    matchLabels:
      app: synapse
      component: synapse-client-reader-envoy