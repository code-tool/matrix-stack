---
# Source: synapse/templates/envoy-deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: synapse-client-reader-envoy
  labels:
    app: synapse
    component: synapse-client-reader-envoy
spec:
  replicas: 2
  selector:
    matchLabels:
      app: synapse
      component: synapse-client-reader-envoy
  strategy:
    
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 1
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: synapse
        component: synapse-client-reader-envoy
      annotations:
        checksum/config: b920eabb52c0c24570a7c5f4dca8397c0e35f06d29459d91b7e723ebd82da5bd
    spec:
      terminationGracePeriodSeconds: 60
      containers:
        - name: envoy
          image: envoyproxy/envoy:v1.36.6
          imagePullPolicy: IfNotPresent
          args:
            - -c
            - /config/envoy.yaml
          ports:
            - name: http
              containerPort: 10000
              protocol: TCP
            - name: http-admin
              containerPort: 9901
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /ready
              port: http-admin
          readinessProbe:
            httpGet:
              path: /ready
              port: http-admin
          resources:
            
            {}
          volumeMounts:
            - name: config
              mountPath: /config/envoy.yaml
              subPath: envoy.yaml
            - name: config
              mountPath: /usr/lib/synapse.lua
              subPath: synapse.lua
      volumes:
        - name: config
          configMap:
            name: synapse-client-reader-envoy