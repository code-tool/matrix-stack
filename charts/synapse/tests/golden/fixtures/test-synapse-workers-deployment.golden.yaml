# Source: synapse/templates/synapse-workers-deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: synapse-client-reader
  labels:
    app: synapse
    component: synapse-client-reader
spec:
  strategy: 
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 1
    type: RollingUpdate
  selector:
    matchLabels:
      app: synapse
      component: synapse-client-reader
  template:
    metadata:
      annotations:
        prometheus.io/port: "9092"
        prometheus.io/scrape: "true"
        prometheus.io/path: "/_synapse/metrics"
        checksum/secret: 907d7a7a7d46618c506ea657dc986db526a46eb3d9e9f91e798a4c01f1e11f22
      labels:
        app: synapse
        component: synapse-client-reader
    spec:
      containers:
      - name: synapse
        image: ghcr.io/code-tool/matrix-stack/synapse:v1.151.0
        imagePullPolicy: IfNotPresent
        resources: 
          limits:
            memory: 2Gi
          requests:
            cpu: 50m
            memory: 128Mi
        env:
        - name: "SYNAPSE_WORKER"
          value: "synapse.app.generic_worker"
        ports:
          - containerPort: 8008
            name: http
            protocol: TCP
          - containerPort: 9092
            name: metrics
            protocol: TCP
        startupProbe:
          httpGet:
            path: /health
            port: http
          failureThreshold: 180
          periodSeconds: 15
        livenessProbe:
          httpGet:
            path: /health
            port: http
          failureThreshold: 5
          periodSeconds: 15
        readinessProbe:
          httpGet:
            path: /health
            port: http
          periodSeconds: 15
        volumeMounts:
        - name: synapse-client-reader-secret
          mountPath: /data
        lifecycle:
          preStop:
            exec:
              command: ["sleep", "15"]
      terminationGracePeriodSeconds: 90
      volumes:
      - name: synapse-client-reader-secret
        secret:
          secretName: synapse-client-reader-secret
