---
# Source: synapse/templates/matrix-authentication-deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: matrix-authentication
  labels:
    app: synapse
    component: matrix-authentication
spec:
  replicas: 2
  selector:
    matchLabels:
      app: synapse
      component: matrix-authentication
  strategy: 
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 1
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: synapse
        component: matrix-authentication
      annotations:
        checksum/config: a5a6b03d26e1be82388abd221457458a5a63dd8bf9433311aa9285394517bc27
    spec:
      terminationGracePeriodSeconds: 60
      containers:
        - name: main
          image: ghcr.io/element-hq/matrix-authentication-service:1.15.0
          imagePullPolicy: IfNotPresent
          env:
            - name: "MAS_CONFIG"
              value: "/etc/mas-config.yaml"
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
            - name: internal
              containerPort: 8081
              protocol: TCP
            - name: metrics
              containerPort: 9100
              protocol: TCP
          livenessProbe:
            httpGet:
              port: internal
              path: /health
          readinessProbe:
            httpGet:
              port: internal
              path: /health
          resources:
            
            {}
          volumeMounts:
            - name: config
              mountPath: "/etc/mas-config.yaml"
              subPath: "mas-config.yaml"
              readOnly: true
      volumes:
        - name: config
          secret:
            secretName: matrix-authentication
            items:
             - key: mas-config.yaml
               path: mas-config.yaml