---
# Source: synapse/templates/matrix-authentication-secret.yaml
apiVersion: v1
kind: Secret
metadata:
  name: matrix-authentication
  annotations:
    argocd.argoproj.io/sync-wave: "-30"
    argocd.argoproj.io/hook: "Sync"
  labels:
    app: synapse
    component: matrix-authentication
type: Opaque
stringData:
  mas-config.yaml: |-
    clients:
      
      - client_auth_method: client_secret_basic
        client_id: NOT-CONFIGURED
        client_secret: NOT-CONFIGURED
    http:
      listeners:
        - name: http
          resources:
            - name: discovery
            - name: human
            - name: oauth
            - name: compat
            - name: graphql
              playground: false
            - name: assets
              path: /usr/local/share/mas-cli/assets/
          binds:
            - address: '[::]:8080'
          proxy_protocol: false
        - name: internal
          resources:
            - name: health
          binds:
            - address: '[::]:8081'
        - name: metrics
          resources:
            - name: prometheus
          binds:
            - address: '[::]:9100'
      trusted_proxies: []
      public_base: https://NOT-CONFIGURED/
      issuer: https://NOT-CONFIGURED/
    database:
      
      connect_timeout: 30
      database: mas
      host: NOT-CONFIGURED
      idle_timeout: 600
      max_connections: 10
      max_lifetime: 1800
      min_connections: 0
      password: NOT-CONFIGURED
      port: 5432
      username: mas_user
    secrets:
      
      encryption: NOT-CONFIGURED
      keys: []
    matrix:
      homeserver: NOT-CONFIGURED
      secret: NOT-CONFIGURED
      endpoint: https://NOT-CONFIGURED/
    
    telemetry:
      tracing:
        exporter: none
        propagators: []
      metrics:
        exporter: prometheus
      sentry:
        dsn: null
    templates:
      path: /usr/local/share/mas-cli/templates/
      assets_manifest: /usr/local/share/mas-cli/manifest.json
      translations_path: /usr/local/share/mas-cli/translations/
    email:
      from: '"Authentication Service" <root@localhost>'
      reply_to: '"Authentication Service" <root@localhost>'
      transport: blackhole
    policy:
      wasm_module: /usr/local/share/mas-cli/policy.wasm
      client_registration_entrypoint: client_registration/violation
      register_entrypoint: register/violation
      authorization_grant_entrypoint: authorization_grant/violation
      password_entrypoint: password/violation
      email_entrypoint: email/violation
      data: null
    branding:
      service_name: null
      policy_uri: null
      tos_uri: null
      imprint: null
      logo_uri: null
    experimental:
      access_token_ttl: 300
      compat_token_ttl: 300