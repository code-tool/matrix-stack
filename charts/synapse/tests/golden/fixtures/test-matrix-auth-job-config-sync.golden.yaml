---
# Source: synapse/templates/matrix-authentication-job-config-sync.yaml
apiVersion: batch/v1
kind: Job
metadata:
  name: matrix-authentication-config-sync
  annotations:
    argocd.argoproj.io/sync-wave: "-10"
    argocd.argoproj.io/hook: "Sync"
spec:
  parallelism: 1
  completions: 1
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: config-sync
          image: ghcr.io/element-hq/matrix-authentication-service:1.18.0
          imagePullPolicy: IfNotPresent
          env:
            - name: "MAS_CONFIG"
              value: "/etc/mas-config.yaml"
          command:
            - /usr/local/bin/mas-cli
            - config
            - sync
          volumeMounts:
            - name: config
              mountPath: "/etc/mas-config.yaml"
              subPath: "mas-config.yaml"
              readOnly: true
      volumes:
        - name: config
          secret:
            secretName: matrix-authentication
            items:
             - key: mas-config.yaml
               path: mas-config.yaml