            name: synapse-client-reader-envoy
      - path: /_matrix/client/(api/v1|r0|v3|unstable)/profile/
        pathType: ImplementationSpecific
        backend:
          service:
            port:
              number: 80
            name: synapse-client-reader-envoy
      - path: /_matrix/client/(api/v1|r0|v3|unstable)/account/(3pid|whoami|deactivate)
        pathType: ImplementationSpecific
        backend:
          service:
            port:
              number: 80
            name: synapse-client-reader-envoy
      - path: /_matrix/client/(api/v1|r0|v3|unstable)/login$
        pathType: ImplementationSpecific
        backend:
          service:
            port:
              number: 80
            name: synapse-client-reader-envoy
      - path: /_matrix/client/(r0|v3|unstable)/register$
        pathType: ImplementationSpecific
        backend:
          service:
            port:
              number: 80
            name: synapse-client-reader-envoy
      - path: /_matrix/client/(r0|v3|unstable)/register/available$
        pathType: ImplementationSpecific
        backend:
          service:
            port:
              number: 80
            name: synapse-client-reader-envoy
      - path: /_matrix/client/v1/register/m.login.registration_token/validity$
        pathType: ImplementationSpecific
        backend:
          service:
            port:
              number: 80
            name: synapse-client-reader-envoy
      - path: /_matrix/client/(r0|v3|unstable)/password_policy$
        pathType: ImplementationSpecific
        backend:
          service:
            port:
              number: 80
            name: synapse-client-reader-envoy
      - path: /_matrix/(federation/(v1|v2)(?!/(media|openid))|key/v2)/
        pathType: ImplementationSpecific
        backend:
          service:
            port:
              number: 80
            name: synapse-client-reader-envoy
      - path: /_matrix/client/(r0|v3|unstable)/user_directory/search$
        pathType: ImplementationSpecific
        backend:
          service:
            port:
              number: 80
            name: synapse-user-dir
      - path: /_matrix/media/
        pathType: ImplementationSpecific
        backend:
          service:
            port:
              number: 80
            name: synapse-media-repository
      - path: /_matrix/client/v1/media/
        pathType: ImplementationSpecific
        backend:
          service:
            port:
              number: 80
            name: synapse-media-repository
      - path: /_matrix/federation/v1/media/
        pathType: ImplementationSpecific
        backend:
          service:
            port:
              number: 80
            name: synapse-media-repository
      - path: /_synapse/admin/v1/purge_media_cache$
        pathType: ImplementationSpecific
        backend:
          service:
            port:
              number: 80
            name: synapse-media-repository
      - path: /_synapse/admin/v1/room/.*/media.*$
        pathType: ImplementationSpecific
        backend:
          service:
            port:
              number: 80
            name: synapse-media-repository
      - path: /_synapse/admin/v1/user/.*/media.*$
        pathType: ImplementationSpecific
        backend:
          service:
