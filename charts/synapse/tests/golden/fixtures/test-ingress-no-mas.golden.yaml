        pathType: ImplementationSpecific
        backend:
          service:
            port:
              number: 80
            name: synapse-client-reader-envoy
      - path: /_matrix/client/(api/v1|r0|v3|unstable)/rooms/.*/(joined_members|context/.*|members|state|hierarchy|relations/|event/|aliases|timestamp_to_event|redact|send|state/|(join|invite|leave|ban|unban|kick))
        pathType: ImplementationSpecific
        backend:
          service:
            port:
              number: 80
            name: synapse-client-reader-envoy
      - path: /_matrix/client/(api/v1|r0|v3|unstable)/(createRoom|publicRooms|voip/turnServer|joined_rooms|search|directory/room/.*|capabilities)
        pathType: ImplementationSpecific
        backend:
          service:
