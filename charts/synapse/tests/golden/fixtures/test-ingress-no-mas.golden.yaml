---
# Source: synapse/templates/synapse-ingress.yaml
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: synapse
  
  annotations: 
    nginx.ingress.kubernetes.io/proxy-body-size: 50m
    nginx.ingress.kubernetes.io/proxy-read-timeout: "320"
    nginx.org/client-max-body-size: 50m
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - NOT-CONFIGURED
  rules:
  - host: NOT-CONFIGURED
    http:
      paths:
      - path: /_matrix/client/(api/v1|r0|v3|unstable)/(account/3pid/|directory/list/room/|rooms/[^/]+/(forget|upgrade|report)|register)
        pathType: ImplementationSpecific
        backend:
          service:
            port:
              number: 80
            name: synapse-master
      - path: /_matrix/client/(unstable|v1)/org.matrix.msc4108/rendezvous$
        pathType: ImplementationSpecific
        backend:
          service:
            port:
              number: 80
            name: synapse-master
      - path: /_synapse/client/rendezvous$
        pathType: ImplementationSpecific
        backend:
          service:
            port:
              number: 80
            name: synapse-master
      - path: /_matrix/federation/v[12]/(?:state_ids|get_missing_events)/(?:%21|!)(?<room>[A-Za-z0-9._=\-\/]+)(:|%3A)[A-Za-z0-9.\-]+
        pathType: ImplementationSpecific
        backend:
          service:
            port:
              number: 80
            name: synapse-client-reader-envoy
      - path: /_matrix/client/(api/v1|r0|v3|unstable)/rooms/(?:%21|!)[A-Za-z0-9._=\-]+(?::|%3[Aa])[A-Za-z0-9.\-]+/typing
        pathType: ImplementationSpecific
        backend:
          service:
            port:
              number: 80
            name: synapse-typing
      - path: /_matrix/client/(r0|v3|unstable)/sendToDevice/
        pathType: ImplementationSpecific
        backend:
          service:
            port:
              number: 80
            name: synapse-to-device
      - path: /_matrix/client/(r0|v3|unstable)/.*/tags
        pathType: ImplementationSpecific
        backend:
          service:
            port:
              number: 80
            name: synapse-account-data
      - path: /_matrix/client/(r0|v3|unstable)/.*/account_data
        pathType: ImplementationSpecific
        backend:
          service:
            port:
              number: 80
            name: synapse-account-data
      - path: /_matrix/client/(r0|v3|unstable)/rooms/(?:%21|!)[A-Za-z0-9._=\-]+(?::|%3[Aa])[A-Za-z0-9.\-]+/receipt
        pathType: ImplementationSpecific
        backend:
          service:
            port:
              number: 80
            name: synapse-receipts
      - path: /_matrix/client/(r0|v3|unstable)/rooms/(?:%21|!)[A-Za-z0-9._=\-]+(?::|%3[Aa])[A-Za-z0-9.\-]+/read_markers
        pathType: ImplementationSpecific
        backend:
          service:
            port:
              number: 80
            name: synapse-receipts
      - path: /_matrix/client/(api/v1|r0|v3|unstable)/presence/
        pathType: ImplementationSpecific
        backend:
          service:
            port:
              number: 80
            name: synapse-presence
      - path: /_matrix/client/(api/v1|r0|v3|unstable)/pushrules/(global|device)/(override|underride|sender|room|content|default)/
        pathType: ImplementationSpecific
        backend:
          service:
            port:
              number: 80
            name: synapse-push-rules
      - path: /_matrix/client/(r0|v3|unstable)/delete_devices$
        pathType: ImplementationSpecific
        backend:
          service:
            port:
              number: 80
            name: synapse-device-lists
      - path: /_matrix/client/(api/v1|r0|v3|unstable)/devices(/|$)
        pathType: ImplementationSpecific
        backend:
          service:
            port:
              number: 80
            name: synapse-device-lists
      - path: /_matrix/client/(r0|v3|unstable)/keys/upload(/|$)
        pathType: ImplementationSpecific
        backend:
          service:
            port:
              number: 80
            name: synapse-device-lists
      - path: /_matrix/client/(api/v1|r0|v3|unstable)/keys/device_signing/upload$
        pathType: ImplementationSpecific
        backend:
          service:
            port:
              number: 80
            name: synapse-device-lists
      - path: /_matrix/client/(api/v1|r0|v3|unstable)/keys/signatures/upload$
        pathType: ImplementationSpecific
        backend:
          service:
            port:
              number: 80
            name: synapse-device-lists
      - path: /_matrix/client/.*(?:%21|!)[A-Za-z0-9._=/-]+(?::|%3[Aa])[A-Za-z0-9.-]+.*$
        pathType: ImplementationSpecific
        backend:
          service:
            port:
              number: 80
            # !
            name: synapse-client-reader-envoy
      - path: /_matrix/client/(api/v1|r0|v3|unstable)/(sync|events|initialSync|rooms/[^/]+/initialSync)$
        pathType: ImplementationSpecific
        backend:
          service:
            port:
