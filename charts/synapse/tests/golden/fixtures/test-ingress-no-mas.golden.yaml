        pathType: ImplementationSpecific
        backend:
          service:
            port:
              number: 80
            name: synapse-client-reader-envoy
      - path: /_matrix/client/(r0|v3|unstable)/notifications$
        pathType: ImplementationSpecific
        backend:
          service:
            port:
              number: 80
            name: synapse-client-reader-envoy
      - path: /_matrix/client/(r0|v3|unstable)/room_keys/
        pathType: ImplementationSpecific
        backend:
          service:
            port:
              number: 80
            name: synapse-client-reader-envoy
      - path: /_matrix/client/(r0|v3|unstable)/keys/(query|changes|claim)
        pathType: ImplementationSpecific
        backend:
          service:
            port:
              number: 80
            name: synapse-client-reader-envoy
      - path: /_matrix/client/unstable/org.matrix.msc3814.v1/dehydrated_device$
        pathType: ImplementationSpecific
