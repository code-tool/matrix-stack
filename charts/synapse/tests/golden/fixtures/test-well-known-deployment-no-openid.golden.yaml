---
# Source: synapse/templates/well-known-deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: well-known
  labels:
    app: well-known
spec:
  replicas: 1
  selector:
    matchLabels:
      app: well-known
  template:
    metadata:
      annotations:
        checksum/config: 327c96f11d3f0e8c5a093e86f3e112c6e9a2f0995d4054b3da2eef27da29dde9
      labels:
        app: well-known
    spec:
      containers:
      - name: well-known
        image: nginx:1.28.3
        imagePullPolicy: Always
        ports:
          - containerPort: 80
            name: http
            protocol: TCP
        resources:
          requests:
            cpu: 20m
            memory: 64Mi
        volumeMounts:
        - name: well-known-config
          subPath: default.conf
          mountPath: /etc/nginx/conf.d/default.conf
        - name: well-known-config
          subPath: client
          mountPath: /usr/share/nginx/html/.well-known/matrix/client
        - name: well-known-config
          subPath: server
          mountPath: /usr/share/nginx/html/.well-known/matrix/server
      terminationGracePeriodSeconds: 10
      volumes:
      - name: well-known-config
        configMap:
          name: well-known-config