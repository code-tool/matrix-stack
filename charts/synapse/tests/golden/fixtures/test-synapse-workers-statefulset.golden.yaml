# Source: synapse/templates/synapse-workers-statefulset.yaml
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: synapse-account-data
  labels:
    app: synapse
    component: synapse-account-data
spec:
  replicas: 1
  selector:
    matchLabels:
      app: synapse
      component: synapse-account-data
  serviceName: synapse-account-data
  template:
    metadata:
      annotations:
        prometheus.io/port: "9092"
        prometheus.io/scrape: "true"
        prometheus.io/path: "/_synapse/metrics"
        checksum/secret: d69581c60c34983d27d5000a4c1439d07d2d1bee3937d0d87862ea5425713326
      labels:
        app: synapse
        component: synapse-account-data
    spec:
      containers:
      - name: synapse
        image: ghcr.io/code-tool/matrix-stack/synapse:v1.155.0
        imagePullPolicy: IfNotPresent
        resources: 
          limits:
            memory: 2Gi
          requests:
            cpu: 50m
            memory: 128Mi
        env:
        - name: "SYNAPSE_WORKER"
          value: "synapse.app.generic_worker"
        ports:
          - containerPort: 8008
            name: http
            protocol: TCP
          - containerPort: 9092
            name: metrics
            protocol: TCP
        startupProbe:
          httpGet:
            path: /health
            port: http
          failureThreshold: 180
          periodSeconds: 15
        livenessProbe:
          httpGet:
            path: /health
            port: http
          failureThreshold: 5
          periodSeconds: 15
        readinessProbe:
          httpGet:
            path: /health
            port: http
          periodSeconds: 15
        volumeMounts:
        - name: synapse-account-data-secret
          mountPath: /data
        lifecycle:
          preStop:
            exec:
              command: ["sleep", "15"]
      terminationGracePeriodSeconds: 90
      volumes:
      - name: synapse-account-data-secret
        secret:
          secretName: synapse-account-data-secret
