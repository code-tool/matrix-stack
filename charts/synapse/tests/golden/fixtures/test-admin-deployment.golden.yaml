---
# Source: synapse/templates/admin-deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: admin
  labels:
    app: admin
spec:
  replicas: 1
  selector:
    matchLabels:
      app: admin
  template:
    metadata:
      labels:
        app: admin
    spec:
      containers:
      - name: admin
        image: ghcr.io/etkecc/ketesa:v1.2.1
        imagePullPolicy: IfNotPresent
        resources:
          
          {}
        ports:
          - containerPort: 8080
            name: admin
            protocol: TCP
      terminationGracePeriodSeconds: 10