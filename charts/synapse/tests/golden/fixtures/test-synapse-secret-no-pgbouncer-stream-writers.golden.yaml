apiVersion: v1
kind: Secret
metadata:
  name: synapse-media-repository-background-jobs-secret
  annotations:
    argocd.argoproj.io/sync-wave: "-30"
    argocd.argoproj.io/hook: "Sync"
  labels:
    app: synapse
    component: synapse-media-repository-background-jobs
type: Opaque
stringData:
  homeserver.yaml: |
    ---
    server_name: NOT-CONFIGURED
    worker_app: synapse.app.media_repository
    account_threepid_delegates: ~
    account_validity: ~
    alias_creation_rules:
      - action: allow
        alias: "*"
        room_id: "*"
        user_id: "*"
    allow_guest_access: false
    allow_per_room_profiles: false
    allow_public_rooms_over_federation: false
    allow_public_rooms_without_auth: false
    auto_join_rooms:
      - "#general:NOT-CONFIGURED"
    auto_join_rooms_for_guests: false
    autocreate_auto_join_room_preset: public_chat
    autocreate_auto_join_rooms: true
    autocreate_auto_join_rooms_federated: false
    block_non_admin_invites: false
    event_cache_size: 10K
    database:
      txn_limit: 10000
      args:
        cp_max: 50
        cp_min: 5
        database: synapse
        host: synapse-pgbouncer
        password: NOT-CONFIGURED
        user: synapse
      name: psycopg2
    rc_message:
      burst_count: 300
      per_second: 100
    disable_msisdn_registration: true
    dynamic_thumbnails: false
    max_upload_size: 100M
    email: ~
    enable_3pid_changes: false
    enable_group_creation: false
    enable_registration: false
    enable_room_list_search: true
    enable_search: true
    enable_set_avatar_url: true
    enable_set_displayname: false
    encryption_enabled_by_default_for_room_type: off
    form_secret: "NOT-CONFIGURED"
    limit_profile_requests_to_users_who_share_rooms: false
    limit_remote_rooms: ~
    worker_listeners:
      - port: 9092
        tls: false
        type: http
        bind_addresses: ['0.0.0.0']
        resources:
          - names: [metrics]
            compress: false
      - port: 8008
        tls: false
        type: http
        x_forwarded: true
        bind_addresses: ['0.0.0.0']
        resources:
          - names: [media]
            compress: false
    enable_metrics: true
    federation_domain_whitelist:
      []
    federation_metrics_domains:
      []
    allow_profile_lookup_over_federation: false
    allow_device_name_lookup_over_federation: false
    update_user_directory_from_worker: synapse-user-dir-0
    instance_map:
      main:
        host: synapse-master-0.synapse-master
        port: 9093
      synapse-typing-0:
        host: synapse-typing-0.synapse-typing
        port: 9093
      synapse-to-device-0:
        host: synapse-to-device-0.synapse-to-device
        port: 9093
      synapse-account-data-0:
        host: synapse-account-data-0.synapse-account-data
        port: 9093
      synapse-presence-0:
        host: synapse-presence-0.synapse-presence
        port: 9093
      synapse-push-rules-0:
        host: synapse-push-rules-0.synapse-push-rules
        port: 9093
      synapse-receipts-0:
        host: synapse-receipts-0.synapse-receipts
        port: 9093
      synapse-device-lists-0:
        host: synapse-device-lists-0.synapse-device-lists
        port: 9093
      synapse-event-persister-0:
        host: synapse-event-persister-0.synapse-event-persister
        port: 9093
      synapse-event-persister-1:
        host: synapse-event-persister-1.synapse-event-persister
        port: 9093
      synapse-federation-sender-0:
        host: synapse-federation-sender-0.synapse-federation-sender
        port: 9093
    stream_writers:
      typing:
        - synapse-typing-0
      to_device:
        - synapse-to-device-0
      account_data:
        - synapse-account-data-0
      presence:
        - synapse-presence-0
      push_rules:
        - synapse-push-rules-0
      receipts:
        - synapse-receipts-0
      device_lists:
        - synapse-device-lists-0
      events:
        - synapse-event-persister-0
        - synapse-event-persister-1
    pusher_instances:
      - synapse-pusher-0
    federation_sender_instances:
      - synapse-federation-sender-0
    run_background_tasks_on: synapse-background-worker-0
    log_config: /data/log.config
    macaroon_secret_key: "NOT-CONFIGURED"
    enable_media_repo: true
    media_storage_providers: 
      []
    media_instance_running_background_jobs: synapse-media-repository-background-jobs-0
    media_store_path: /tmp/media_store
    enable_local_media_storage: true
    metrics_flags: ~
    oidc_providers: 
      []
    old_signing_keys: ~
    password_config:
      enabled: false
    password_providers: 
      []
    pid_file: /tmp/homeserver.pid
    push: ~
    start_pushers: False
    retention: ~
    redaction_retention_period: ~
    forgotten_room_retention_period: 7d
    user_ips_max_age: 1y
    redis:
      enabled: true
      host: "redis"
      port: 6379
    registration_shared_secret: "NOT-CONFIGURED"
    report_stats: false
    require_auth_for_profile_requests: true
    require_membership_for_aliases: true
    signing_key_path: /data/signing.key
    soft_file_limit: 0
    spam_checker: ~
    sso: ~
    thumbnail_sizes:
      - height: 32
        method: crop
        width: 32
      - height: 96
        method: crop
        width: 96
      - height: 240
        method: scale
        width: 320
    trusted_key_servers:
      - server_name: NOT-CONFIGURED
    turn_allow_guests: false
    turn_shared_secret: 
    turn_uris:
      []
    turn_user_lifetime: 86400000
    ui_auth: ~
    url_preview_accept_language: ~
    url_preview_enabled: false
    use_presence: true
    user_directory:
      enabled: true
      search_all_users: false
      prefer_local_users: true
    web_client_location: "https://NOT-CONFIGURED/"
    # https://matrix-org.github.io/matrix-authentication-service/setup/homeserver.html#configure-the-homeserver-to-delegate-authentication-to-the-service
    matrix_authentication_service:
      # Enable the MAS integration
      enabled: true
      # The base URL where Synapse will contact MAS
      endpoint: http://matrix-authentication.test-namespace.svc:80
      # The shared secret used to authenticate MAS requests, must be the same as `matrix.secret` in the MAS configuration
      # See https://element-hq.github.io/matrix-authentication-service/reference/configuration.html#matrix
      secret: NOT-CONFIGURED
    experimental_features:
      msc3967_enabled: true
    caches:
      expire_caches: true
      global_factor: 1
      cache_entry_ttl: 30m
      sync_response_cache_duration: 2m
      cache_autotuning:
        max_cache_memory_usage: 1843M
        target_cache_memory_usage: 1474M
        min_cache_ttl: 5m
    opentracing: ~

  log.config: |
    ---
    disable_existing_loggers: false
    formatters:
      precise:
        format: "%(asctime)s - %(name)s - %(lineno)d - %(levelname)s - %(request)s - %(message)s"
    handlers:
      console:
        class: logging.StreamHandler
        formatter: precise
    loggers:
      synapse.handlers.pagination:
        level: INFO
      synapse.config.retention:
        level: INFO
      synapse.metrics.background_process_metrics:
        level: INFO
      synapse.storage.SQL:
        level: WARNING
      twisted:
        handlers:
          - console
        propagate: false
    root:
      handlers:
        - console
      level: WARNING
    version: 1
  signing.key: |
    NOT-CONFIGURED
  idp.xml: |
