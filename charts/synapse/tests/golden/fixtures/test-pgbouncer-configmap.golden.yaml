---
# Source: synapse/templates/pgbouncer-configmap.yaml
apiVersion: v1
kind: ConfigMap
metadata:
  name: synapse-pgbouncer
  labels:
    app: synapse-pgbouncer
data:
  pgbouncer.ini: |
    [databases]
    synapse=host=NOT-CONFIGURED4 port=5432 dbname=synapse
    [pgbouncer]
    listen_port=5432
    listen_addr=0.0.0.0
    unix_socket_dir=/tmp/
    unix_socket_mode=0777
    auth_file = /etc/userlist/userlist.txt
    server_reset_query = SELECT pg_advisory_unlock_all()
    server_reset_query_always = 1
    admin_users=synapse
    pool_mode=transaction
    auth_type=md5
    default_pool_size=20
    max_client_conn=8192